name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    # Testcontainers uses the runner's Docker daemon to start Postgres, Redis,
    # and Kafka — no service containers needed here.
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Unit tests
        run: mvn -B test

      - name: Verify (integration tests via Testcontainers)
        run: mvn -B verify
