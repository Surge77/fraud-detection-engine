# Local profile overrides — points at docker-compose services on localhost.
# Secrets stay in env vars; defaults here are dev-only, never production.
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/fraud
    username: fraud
    password: fraud
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092

logging:
  level:
    com.fraudengine: DEBUG
    org.springframework.kafka: WARN
