spring:
  application:
    name: fraud-engine
  profiles:
    active: local
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/fraud}
    username: ${DB_USER:fraud}
    password: ${DB_PASSWORD:fraud}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  batch:
    job:
      enabled: false
    jdbc:
      # Schema is owned by Flyway (V2). Never let Boot run the batch DDL — it would
      # fail on the second startup against a persistent database (CREATE TABLE,
      # no IF NOT EXISTS).
      initialize-schema: never
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: fraud-engine
      auto-offset-reset: earliest
      max-poll-records: 10
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "com.fraudengine.*"
        spring.json.value.default.type: com.fraudengine.domain.model.TransactionRequest
    listener:
      ack-mode: manual
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        enable.idempotence: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  metrics:
    tags:
      application: fraud-engine

springdoc:
  swagger-ui:
    path: /swagger-ui.html

# Business config — tunable without code deploy
fraud:
  # Token required on admin endpoints (X-Admin-Token header). Dev default only;
  # override with ADMIN_TOKEN in any real environment.
  admin:
    token: ${ADMIN_TOKEN:local-dev-admin-token}
  weights:
    blacklisted-merchant: 40
    high-velocity: 30
    amount-exceeded: 20
    high-risk-location: 10
  threshold: 75
  velocity:
    window-seconds: 300
    max-transactions: 10

logging:
  level:
    com.fraudengine: INFO
